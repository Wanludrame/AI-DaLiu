name: Notify new story via ServerChan

on:
  push:
    branches: [master]
    paths:
      - '电子大刘作品/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new story
        id: detect
        run: |
          # Find newly added .txt files in 电子大刘作品/
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '电子大刘作品/*.txt' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "found=true" >> $GITHUB_OUTPUT

          # Extract story title from first new file
          FIRST_FILE=$(echo "$NEW_FILES" | head -1)
          # Filename format: 标题_timestamp.txt
          BASENAME=$(basename "$FIRST_FILE" .txt)
          TITLE=$(echo "$BASENAME" | sed 's/_[0-9]*$//')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "file=$FIRST_FILE" >> $GITHUB_OUTPUT

          # Read first 3 lines after [提示词] line for context
          PROMPT=$(grep '^\[提示词\]' "$FIRST_FILE" | head -1 | sed 's/\[提示词\] //')
          echo "prompt=$PROMPT" >> $GITHUB_OUTPUT

      - name: Send to ServerChan
        if: steps.detect.outputs.found == 'true'
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_KEY }}
          TITLE: ${{ steps.detect.outputs.title }}
          PROMPT: ${{ steps.detect.outputs.prompt }}
          FILE: ${{ steps.detect.outputs.file }}
        run: |
          if [ -z "$SENDKEY" ]; then
            echo "SERVERCHAN_KEY secret not set, skipping notification"
            exit 0
          fi

          MSG_TITLE="电子大刘新作：《${TITLE}》"
          MSG_BODY="**提示词**: ${PROMPT}

          **查看作品**: [GitHub](https://github.com/${{ github.repository }}/blob/master/${FILE})

          *由 AI 自动生成并推送*"

          curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
            -d "title=${MSG_TITLE}" \
            -d "desp=${MSG_BODY}"
